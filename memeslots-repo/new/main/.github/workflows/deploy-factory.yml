name: Deploy Factory to OP_NET

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - mainnet

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build WASM
        working-directory: contracts
        run: npm ci && npm run build:all

      - name: Deploy Factory
        working-directory: scripts
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          NETWORK: ${{ inputs.network }}
        run: npm ci && node deploy-factory.mjs

      - name: Save factory address
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/index.html scripts/deployed.json || true
          git diff --staged --quiet || git commit -m "deploy: update factory address [skip ci]"
          git push
